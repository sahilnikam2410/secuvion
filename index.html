    <!-- Consent-gated analytics (DPDP Act 2023 + GDPR compliant) -->
    <!-- GA4 + Microsoft Clarity only load after user grants analytics consent -->
    <script>
      (function () {
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { dataLayer.push(arguments); };
        gtag('js', new Date());
        // Consent defaults: deny until user accepts (Google Consent Mode v2)
        gtag('consent', 'default', {
          ad_storage: 'denied',
          ad_user_data: 'denied',
          ad_personalization: 'denied',
          analytics_storage: 'denied',
          functionality_storage: 'granted',
          security_storage: 'granted',
          wait_for_update: 500
        });

        function loadAnalytics() {
          if (window.__secuvionAnalyticsLoaded) return;
          window.__secuvionAnalyticsLoaded = true;

          // GA4
          var ga = document.createElement('script');
          ga.async = true;
          ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-TDRWQQVZP3';
          document.head.appendChild(ga);
          gtag('consent', 'update', { analytics_storage: 'granted' });
          gtag('config', 'G-TDRWQQVZP3', { anonymize_ip: true });

          // Microsoft Clarity — replace YOUR_CLARITY_ID with actual project ID from clarity.microsoft.com
          (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments); };
            t = l.createElement(r); t.async = 1; t.src = 'https://www.clarity.ms/tag/' + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
          })(window, document, 'clarity', 'script', 'wf0yr6fsb2');
        }

        try {
          var consent = JSON.parse(localStorage.getItem('secuvion_consent_v2') || 'null');
          if (consent && consent.analytics) loadAnalytics();
        } catch (e) { /* ignore */ }

        // React CookieConsent fires this event after user decision
        window.addEventListener('secuvion:consent-updated', function (e) {
          if (e && e.detail && e.detail.analytics) loadAnalytics();
        });
      })();
    </script>

  <body>
    <div id="root">
      <!-- Branded splash screen while JS loads -->
      <div id="splash" style="position:fixed;inset:0;z-index:99999;background:#030712;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,sans-serif;">
        <style>
          @keyframes sp-pulse{0%,100%{opacity:0.4;transform:scale(0.95)}50%{opacity:1;transform:scale(1)}}
          #splash svg.wolf-svg{animation:sp-pulse 1.8s ease-in-out infinite}
          #splash .snake-loader { margin-top: 18px; }
          @keyframes sp-slither {
            0%   { stroke-dashoffset: 500; }
            100% { stroke-dashoffset: 0; }
          }
        </style>
        <img class="wolf-svg" src="/wolf-mark.png?v=2" alt="VRIKAAN" width="80" height="80" />
        <div style="margin-top:20px;font-size:18px;font-weight:700;color:#f1f5f9;letter-spacing:2px">VRIKAAN</div>
        <svg class="snake-loader" width="320" height="64" viewBox="0 0 320 64" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
          <defs>
            <linearGradient id="sk-grad" x1="0" x2="1" y1="0" y2="0">
              <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
              <stop offset="12%"  stop-color="#6366f1" stop-opacity="0.35"/>
              <stop offset="38%"  stop-color="#8b5cf6" stop-opacity="0.85"/>
              <stop offset="68%"  stop-color="#14e3c5" stop-opacity="1"/>
              <stop offset="92%"  stop-color="#ffffff" stop-opacity="1"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
            </linearGradient>
            <radialGradient id="sk-ambient" cx="50%" cy="50%" r="60%">
              <stop offset="0%"   stop-color="#14e3c5" stop-opacity="0.22"/>
              <stop offset="55%"  stop-color="#6366f1" stop-opacity="0.10"/>
              <stop offset="100%" stop-color="#14e3c5" stop-opacity="0"/>
            </radialGradient>
            <filter id="sk-blur-heavy" x="-30%" y="-100%" width="160%" height="300%">
              <feGaussianBlur stdDeviation="6"/>
            </filter>
            <filter id="sk-blur-med" x="-20%" y="-80%" width="140%" height="260%">
              <feGaussianBlur stdDeviation="2.5"/>
            </filter>
          </defs>
          <!-- Ambient breathing halo -->
          <ellipse cx="160" cy="32" rx="170" ry="28" fill="url(#sk-ambient)">
            <animate attributeName="opacity" values="0.4;0.85;0.4" dur="2.6s" repeatCount="indefinite"/>
            <animate attributeName="rx" values="160;180;160" dur="2.6s" repeatCount="indefinite"/>
          </ellipse>
          <!-- Faint dashed track -->
          <path d="M 8 32 C 44 8, 76 56, 112 32 S 184 8, 216 32 S 288 56, 312 32"
                fill="none" stroke="rgba(148,163,184,0.12)" stroke-width="1.5"
                stroke-linecap="round" stroke-dasharray="3 5"/>
          <!-- Snake LAYER 1 — heavy outer halo -->
          <path d="M 8 32 C 44 8, 76 56, 112 32 S 184 8, 216 32 S 288 56, 312 32"
                fill="none" stroke="url(#sk-grad)" stroke-width="9" stroke-linecap="round"
                stroke-dasharray="95 420" stroke-dashoffset="500" opacity="0.55"
                filter="url(#sk-blur-heavy)"
                style="animation: sp-slither 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite"/>
          <!-- Snake LAYER 2 — medium glow -->
          <path d="M 8 32 C 44 8, 76 56, 112 32 S 184 8, 216 32 S 288 56, 312 32"
                fill="none" stroke="url(#sk-grad)" stroke-width="4.5" stroke-linecap="round"
                stroke-dasharray="95 420" stroke-dashoffset="500"
                filter="url(#sk-blur-med)"
                style="animation: sp-slither 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite"/>
          <!-- Snake LAYER 3 — sharp body -->
          <path d="M 8 32 C 44 8, 76 56, 112 32 S 184 8, 216 32 S 288 56, 312 32"
                fill="none" stroke="url(#sk-grad)" stroke-width="2" stroke-linecap="round"
                stroke-dasharray="95 420" stroke-dashoffset="500"
                style="animation: sp-slither 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite"/>
        </svg>
        <div style="margin-top:12px;font-size:11px;color:#64748b;letter-spacing:0.5px">Initializing secure environment...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Splash shows for exactly 5 seconds, then fades out — gives users
      // time to register the brand mark + tagline on every page load.
      // (If React is ready before 5s, it renders behind the splash silently;
      //  if React takes longer than 5s, splash still hides and app continues
      //  to mount in the background.)
      const SPLASH_MS = 5000;
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.transition = 'opacity 0.5s ease';
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }
      }, SPLASH_MS);
    </script>
