<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="VRIKAAN">
  <defs>
    <radialGradient id="vrk-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0f1730"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="vrk-eye" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14e3c5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="vrk-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded base -->
  <rect width="32" height="32" rx="7" fill="url(#vrk-bg)"/>

  <!-- Wolf head silhouette (very subtle, hints at the shape) -->
  <path d="M 6.5 12 L 8 4 L 12 11 L 16 10 L 20 11 L 24 4 L 25.5 12 L 25 18 L 22 23 L 16 27 L 10 23 L 7 18 Z"
        fill="#000" opacity="0.55"/>

  <!-- Glowing wolf eyes (slanted, alert) -->
  <g filter="url(#vrk-glow)">
    <path d="M 9.5 15.5 L 13.5 14 L 13.7 16.2 L 9.8 17.4 Z" fill="url(#vrk-eye)"/>
    <path d="M 22.5 15.5 L 18.5 14 L 18.3 16.2 L 22.2 17.4 Z" fill="url(#vrk-eye)"/>
  </g>

  <!-- Solid white core for sharpness at small sizes -->
  <path d="M 10.5 15.7 L 13 14.7 L 13.1 15.9 L 10.6 16.7 Z" fill="#fff"/>
  <path d="M 21.5 15.7 L 19 14.7 L 18.9 15.9 L 21.4 16.7 Z" fill="#fff"/>
</svg>
