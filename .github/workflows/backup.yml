name: Firestore Nightly Backup

on:
  schedule:
    # Runs daily at 03:00 UTC (08:30 IST)
    - cron: "0 3 * * *"
  workflow_dispatch: {} # allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install firebase-admin
        run: npm install firebase-admin --no-save

      - name: Run backup
        env:
          FIREBASE_ADMIN_KEY: ${{ secrets.FIREBASE_ADMIN_KEY }}
        run: node scripts/backup-firestore.js

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestore-backup-${{ github.run_id }}
          path: backups/
          retention-days: 30
